name: Update market data

on:
  schedule:
    # 매일 22:30 UTC = 한국시간 오전 7:30 (미국 장 마감 후, 서머타임 무관 안전)
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data
        run: python fetch_data.py

      - name: Commit & push
        run: |
          git config user.name "bmo-moneyflow-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json sector_map.json
          git commit -m "data: $(date -u +%Y-%m-%d)" || echo "변경 없음"
          git push
