name: Sync Signal Flow

on:
  workflow_dispatch: {}
  schedule:
    # 12:10 KST, Tue-Sat. Runs after the SEC data workflow finishes.
    - cron: "10 3 * * 2-6"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest Signal Flow build
        run: git clone --depth 1 https://github.com/bemorebb66-stack/bmo-antman.git /tmp/bmo-antman

      - name: Publish under the BVT Money Flow domain
        run: |
          rm -rf insider ipo-lockup
          mkdir -p insider ipo-lockup
          cp -R /tmp/bmo-antman/docs/. insider/
          cp -R /tmp/bmo-antman/docs/. ipo-lockup/

      - name: Commit synced pages
        run: |
          git config user.name "bmo-moneyflow-bot"
          git config user.email "actions@users.noreply.github.com"
          git add insider ipo-lockup
          git commit -m "Sync Signal Flow pages" || echo "No Signal Flow changes"
          git push
